name: Build WGEKeyboardFix All Formats

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Verify Environment
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Compile Dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 -arch arm64e -miphoneos-version-min=13.0 \
            -isysroot "$SDK" \
            -framework UIKit -framework Foundation \
            -o WGEKeyboardFix.dylib WGEKeyboardFix.m
          codesign -s - WGEKeyboardFix.dylib

      - name: Structure Output
        run: |
          mkdir -p out
          cp WGEKeyboardFix.dylib out/
          cp WGEKeyboardFix.plist out/
          
          mkdir -p out/rootful/Library/MobileSubstrate/DynamicLibraries
          cp WGEKeyboardFix.dylib out/rootful/Library/MobileSubstrate/DynamicLibraries/
          cp WGEKeyboardFix.plist out/rootful/Library/MobileSubstrate/DynamicLibraries/
          cp control out/rootful/
          
          mkdir -p out/rootless/var/jb/Library/MobileSubstrate/DynamicLibraries
          cp WGEKeyboardFix.dylib out/rootless/var/jb/Library/MobileSubstrate/DynamicLibraries/
          cp WGEKeyboardFix.plist out/rootless/var/jb/Library/MobileSubstrate/DynamicLibraries/
          cp control out/rootless/
          
          mkdir -p out/roothide/var/jb/Library/MobileSubstrate/DynamicLibraries
          cp WGEKeyboardFix.dylib out/roothide/var/jb/Library/MobileSubstrate/DynamicLibraries/
          cp WGEKeyboardFix.plist out/roothide/var/jb/Library/MobileSubstrate/DynamicLibraries/
          cp control out/roothide/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WGEKeyboardFix-Payload
          path: out/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: WGEKeyboardFix build ${{ github.run_number }}
          files: out/WGEKeyboardFix.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
