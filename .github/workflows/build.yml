name: Build All Formats

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Build Rootful
        env:
          THEOS: /Users/runner/theos
        run: |
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootful
          mkdir -p out
          find .theos/obj/ -name "WGEKeyboardFix.dylib" -exec cp {} out/WGEKeyboardFix.dylib \;
          mv packages/*.deb out/WGEKeyboardFix_rootful.deb || true

      - name: Build Rootless
        env:
          THEOS: /Users/runner/theos
        run: |
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb out/WGEKeyboardFix_rootless.deb || true

      - name: Build Roothide
        env:
          THEOS: /Users/runner/theos
        run: |
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide
          mv packages/*.deb out/WGEKeyboardFix_roothide.deb || true

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WGEKeyboardFix-All-Files
          path: out/
